<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>截屏预览</title>
  <style>
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background: #000; overflow: hidden; user-select: none;
    }
    #stage {
      position: fixed; inset: 0; display: flex;
      align-items: center; justify-content: center;
      cursor: zoom-out;
    }
    img#shot {
      max-width: 100%; max-height: 100%;
      object-fit: contain;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.06);
    }
    #hint {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      color: #aaa; font-family: sans-serif; font-size: 12px;
      background: rgba(0,0,0,0.55); padding: 4px 10px; border-radius: 12px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="stage" title="点击或按 ESC 关闭">
    <img id="shot" alt="screenshot" />
  </div>
  <div id="hint">点击任意位置 / 按 ESC 关闭</div>
  <script>
    // 从 URL hash 读取 base64 dataURL（main.js 用 loadFile(..., { hash }) 注入）
    function getHashDataUrl() {
      var raw = window.location.hash || '';
      if (raw.startsWith('#')) raw = raw.slice(1);
      try { raw = decodeURIComponent(raw); } catch (e) {}
      return raw;
    }
    var dataUrl = getHashDataUrl();
    var img = document.getElementById('shot');
    if (dataUrl) {
      img.src = dataUrl;
    } else {
      document.body.innerHTML = '<div style="color:#fff;padding:24px;font-family:sans-serif">没有接收到截图数据</div>';
    }

    function closeWindow() {
      var { ipcRenderer } = require('electron');
      ipcRenderer.invoke('preview:close');
    }

    // 点击空白处或图片 -> 关闭
    document.getElementById('stage').addEventListener('click', closeWindow);
    // ESC -> 关闭
    window.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' || e.keyCode === 27) {
        closeWindow();
      }
    });
  </script>
</body>
</html>
